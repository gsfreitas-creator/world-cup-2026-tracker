<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 • Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-6px); }
        .modal { animation: fadeIn 0.2s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0a0f1e] text-slate-200">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#0a0f1e] border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 bg-emerald-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-trophy text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="font-display text-3xl font-semibold tracking-tighter">World Cup 2026</h1>
                    <p class="text-xs text-emerald-400 -mt-1">CAN • MEX • USA</p>
                </div>
            </div>
            <div class="flex items-center gap-x-2">
                <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026" target="_blank" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-sm font-medium flex items-center gap-x-2">
                    <i class="fa-solid fa-globe"></i><span>FIFA</span>
                </a>
                <button onclick="installApp()" class="px-4 py-2 bg-white text-slate-950 font-semibold rounded-3xl text-sm flex items-center gap-x-2 active:scale-[0.985]">
                    <i class="fa-solid fa-download"></i><span class="hidden sm:inline">Install</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-4 border-b border-slate-700 bg-[#0a0f1e]">
        <div class="flex overflow-x-auto text-sm font-medium">
            <button onclick="switchTab('home')" class="tab-active px-5 py-4 flex-shrink-0" id="tab-home">Home</button>
            <button onclick="switchTab('contenders')" class="px-5 py-4 flex-shrink-0" id="tab-contenders">Contenders</button>
            <button onclick="switchTab('groups')" class="px-5 py-4 flex-shrink-0" id="tab-groups">Groups</button>
            <button onclick="switchTab('schedule')" class="px-5 py-4 flex-shrink-0" id="tab-schedule">Schedule</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 pb-24">

        <!-- HOME -->
        <div id="section-home" class="section active">
            <div class="rounded-3xl bg-gradient-to-br from-emerald-900/40 to-[#1a2338] p-8 border border-emerald-800/50 mb-8">
                <div class="text-center">
                    <div class="text-xs text-slate-400">TIME UNTIL OPENING MATCH</div>
                    <div id="countdown" class="font-display text-5xl font-bold text-emerald-400">12d 14h 22m</div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENDERS -->
        <div id="section-contenders" class="section">
            <h3 class="font-semibold text-2xl mb-4">Main Contenders</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="contenders-container"></div>
        </div>

        <!-- GROUPS -->
        <div id="section-groups" class="section">
            <h3 class="font-semibold text-2xl mb-4">Groups (Click for Standings)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="groups-container"></div>
        </div>

        <!-- SCHEDULE -->
        <div id="section-schedule" class="section">
            <h3 class="font-semibold text-2xl mb-4">Full Schedule</h3>
            <div id="schedule-container" class="space-y-3"></div>
        </div>

    </div>

    <!-- Modal -->
    <div id="modal" onclick="closeModal()" class="hidden fixed inset-0 bg-black/70 flex items-end md:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-[#121a2e] border border-slate-700 w-full md:w-[480px] rounded-t-3xl md:rounded-3xl p-6 max-h-[85vh] overflow-auto">
            <div id="modal-content"></div>
            <button onclick="closeModal()" class="mt-5 w-full py-3 text-sm font-semibold bg-emerald-600 hover:bg-emerald-500 rounded-3xl">Close</button>
        </div>
    </div>

    <script>
        // Complete data
        const contenders = [
            { name: "France", odds: "18.1%", flag: "https://flagcdn.com/w160/fr.png", reason: "Current favorite" },
            { name: "Spain", odds: "16.7%", flag: "https://flagcdn.com/w160/es.png", reason: "Tiki-taka revival" },
            { name: "England", odds: "11.3%", flag: "https://flagcdn.com/w160/gb-eng.png", reason: "Best squad" },
            { name: "Brazil", odds: "9.0%", flag: "https://flagcdn.com/w160/br.png", reason: "Vinícius factor" }
        ];

        const groups = [
            { name: "A", standings: [{team:"Mexico",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"South Africa",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Korea Republic",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Czechia",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}] },
            { name: "B", standings: [{team:"Canada",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Bosnia",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Qatar",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Switzerland",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}] },
            { name: "C", standings: [{team:"Brazil",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Morocco",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Haiti",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Scotland",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}] },
            { name: "D", standings: [{team:"United States",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Paraguay",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Australia",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0},{team:"Türkiye",pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0}] }
        ];

        const scheduleData = [
            { date: "Jun 11", time: "15:00", home: "Mexico", away: "South Africa", venue: "Estadio Azteca" },
            { date: "Jun 11", time: "21:00", home: "Korea Republic", away: "Czechia", venue: "Estadio Akron" },
            { date: "Jun 12", time: "15:00", home: "Canada", away: "Bosnia", venue: "BMO Field" }
        ];

        function renderContenders() {
            const container = document.getElementById('contenders-container');
            container.innerHTML = '';
            contenders.forEach(team => {
                const div = document.createElement('div');
                div.className = `card-hover bg-[#121a2e] border border-slate-700 rounded-3xl p-5 flex items-center gap-x-4 cursor-pointer`;
                div.innerHTML = `
                    <img src="${team.flag}" class="w-16 h-11 object-cover rounded-xl">
                    <div class="flex-1">
                        <div class="font-semibold text-xl">${team.name}</div>
                        <div class="text-emerald-400 text-sm">${team.odds} chance</div>
                        <div class="text-xs text-slate-400">${team.reason}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderGroups() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';
            groups.forEach(g => {
                const div = document.createElement('div');
                div.className = `card-hover bg-[#121a2e] border border-slate-700 rounded-3xl p-4 cursor-pointer hover:border-emerald-600`;
                div.onclick = () => showGroupModal(g);
                div.innerHTML = `
                    <div class="font-semibold text-xl">Group ${g.name}</div>
                    <div class="text-xs text-slate-400 mt-1">${g.standings.map(s => s.team).join(" • ")}</div>
                `;
                container.appendChild(div);
            });
        }

        function showGroupModal(group) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            let html = `<div class="font-semibold text-3xl mb-4">Group ${group.name} Standings</div><table class="w-full text-sm"><thead><tr class="text-xs text-slate-400"><th class="text-left">Team</th><th class="text-center">Pts</th></tr></thead><tbody>`;
            group.standings.forEach(s => {
                html += `<tr><td class="py-2">\( {s.team}</td><td class="text-center font-bold"> \){s.pts}</td></tr>`;
            });
            html += `</tbody></table>`;
            content.innerHTML = html;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            scheduleData.forEach(match => {
                const div = document.createElement('div');
                div.className = `bg-[#121a2e] border border-slate-700 rounded-3xl p-4 flex justify-between items-center`;
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${match.home} <span class="text-emerald-400">vs</span> ${match.away}</div>
                        <div class="text-xs text-slate-400">${match.date} • ${match.time} • ${match.venue}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function installApp() {
            alert("Pixel: Tap three dots ⋮ → Install app");
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${tab}`).classList.add('active');
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
        }

        function startCountdown() {
            const el = document.getElementById('countdown');
            const target = new Date('2026-06-11T15:00:00-04:00').getTime();
            setInterval(() => {
                const diff = target - Date.now();
                if (diff < 0) { el.innerHTML = "It's Match Day!"; return; }
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                el.innerHTML = `${d}d ${h}h ${m}m`;
            }, 30000);
        }

        function init() {
            startCountdown();
            renderContenders();
            renderGroups();
            renderSchedule();
            console.log('%c[V7.0] Full working version loaded', 'color:#00a651');
        }

        window.onload = init;
    </script>
</body>
</html>
